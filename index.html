<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermaid Exporter</title>
  <link rel="icon" type="image/svg+xml" href="asserts/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="asserts/favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="toolbar">
    <div class="toolbar-left">
      <h1 class="logo">Mermaid Exporter</h1>
      <select id="select-mermaid-theme" title="Mermaid 图表主题">
        <option value="default">Default</option>
        <option value="neutral">Neutral</option>
        <option value="dark">Dark</option>
        <option value="forest">Forest</option>
        <option value="base">Base</option>
      </select>
      <div class="look-toggle" aria-label="图表风格">
        <span class="look-label">风格</span>
        <div class="png-size-toggle look-toggle-buttons">
          <button type="button" class="toggle-btn" data-look="classic" title="经典风格">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M7 8h10M7 12h6M7 16h8"/>
            </svg>
            <span>经典</span>
          </button>
          <button type="button" class="toggle-btn" data-look="handDrawn" title="手绘风格">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 20l-9 1 1-9 11-11 8 8-11 11z"/>
              <path d="M16 4l4 4"/>
            </svg>
            <span>手绘</span>
          </button>
        </div>
      </div>
    </div>
    <div class="toolbar-right">
      <button id="btn-copy-svg" title="复制 SVG 代码">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span>复制 SVG</span>
      </button>
      <button id="btn-download-svg" title="下载 SVG 文件">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>下载 SVG</span>
      </button>
      <button id="btn-copy-png" title="复制为图片">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>复制图片</span>
      </button>
      <button id="btn-download-png" title="下载 PNG 文件">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>下载 PNG</span>
      </button>
      <div class="png-size-group">
        <span class="png-size-label">PNG size</span>
        <div class="png-size-toggle png-size-toggle-group">
          <button type="button" class="toggle-btn active" data-mode="auto">Auto</button>
          <button type="button" class="toggle-btn" data-mode="fixed-width">Width</button>
          <button type="button" class="toggle-btn" data-mode="fixed-height">Height</button>
        </div>
        <input type="number" id="png-size-value" class="png-size-input" min="100" max="10000" value="1080" placeholder="1080">
      </div>
      <div class="toolbar-divider"></div>
      <button id="btn-theme" title="切换主题">
        <svg id="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <a href="https://github.com/QAbot-zh/mermaid-exporter" target="_blank" rel="noopener noreferrer" class="toolbar-link" title="GitHub">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      </a>
    </div>
  </header>

  <main class="split-pane">
    <div class="pane editor-pane" id="editor-pane">
      <div class="pane-header">
        <span class="pane-title">编辑器</span>
        <div class="pane-controls">
          <label class="pane-control" for="select-editor-font-size">
            <span class="pane-control-label">字号</span>
            <select id="select-editor-font-size" class="pane-select" title="编辑器字体大小">
              <option value="12">12px</option>
              <option value="14">14px</option>
              <option value="16">16px</option>
              <option value="18">18px</option>
              <option value="20">20px</option>
            </select>
          </label>
        </div>
      </div>
      <div id="editor"></div>
      <details class="samples" id="samples" open>
        <summary class="samples-summary">
          <span class="samples-title">示例图表</span>
        </summary>
        <div class="samples-body">
          <div class="samples-list" id="sample-diagrams"></div>
        </div>
      </details>
    </div>
    <div class="divider" id="divider"></div>
    <div class="pane preview-pane" id="preview-pane">
      <div class="pane-header">
        <span class="pane-title">预览</span>
        <div class="direction-control" id="direction-control" style="display:none">
          <span class="direction-label">方向</span>
          <div class="png-size-toggle direction-toggle">
            <button type="button" class="toggle-btn" data-dir="TD" title="从上到下">↓ TD</button>
            <button type="button" class="toggle-btn" data-dir="LR" title="从左到右">→ LR</button>
            <button type="button" class="toggle-btn" data-dir="BT" title="从下到上">↑ BT</button>
            <button type="button" class="toggle-btn" data-dir="RL" title="从右到左">← RL</button>
          </div>
        </div>
      </div>
      <div id="preview"></div>
    </div>
  </main>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
